services:
  bruin:
    image: ghcr.io/bruin-data/bruin:latest

    container_name: bruin-local-pipeline

    # Mount project and explicitly map DuckDB file
    volumes:
      - .:/workspace                  # main project
      - ./local_data.duckdb:/workspace/local_data.duckdb  # DuckDB persistence

    working_dir: /workspace

    # Keep interactive for seeing logs
    stdin_open: true
    tty: true

    # Environment variables
    environment:
      - PIPELINE_DATE=${PIPELINE_DATE:-}
      - BRUIN_LOG_LEVEL=${BRUIN_LOG_LEVEL:-INFO}

    # Error logging: capture output to host
    # Run: docker compose logs -f bruin
    # Or: docker compose logs --tail=100 bruin > pipeline.log

      